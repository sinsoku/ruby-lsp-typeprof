plugins:
  - rubocop-rake
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Naming/FileName:
  Exclude:
    - "lib/ruby-lsp-typeprof.rb"
